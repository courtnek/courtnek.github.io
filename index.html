<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>kailean.com</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #1a1b2e;
      --surface:    #16213e;
      --surface-2:  #0f3460;
      --border:     #2a2d4a;
      --text:       #a9b1d6;
      --text-bright:#c0caf5;
      --text-dim:   #565f89;
      --purple:     #bb9af7;
      --blue:       #7aa2f7;
      --cyan:       #7dcfff;
      --green:      #9ece6a;
      --radius:     8px;
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      gap: 3rem;
    }

    header {
      text-align: center;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      color: var(--text-bright);
      letter-spacing: -0.01em;
    }

    .subtitle {
      font-size: 0.9rem;
      color: var(--text-dim);
      margin-top: 0.5rem;
    }

    .projects {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 1rem;
      width: 100%;
      max-width: 800px;
    }

    a.project-card {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      text-decoration: none;
      color: var(--text);
      transition: border-color 0.2s, transform 0.2s;
      position: relative;
      overflow: hidden;
    }

    a.project-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      opacity: 0;
      transition: opacity 0.2s;
    }

    a.project-card:hover {
      transform: translateY(-2px);
      border-color: var(--accent-color, var(--purple));
    }

    a.project-card:hover::before {
      opacity: 1;
      background: var(--accent-color, var(--purple));
    }

    .card-impromptu  { --accent-color: var(--purple); }
    .card-qr         { --accent-color: var(--cyan); }
    .card-retro      { --accent-color: var(--green); }

    .project-tag {
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--accent-color, var(--purple));
    }

    .project-name {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text-bright);
    }

    .project-desc {
      font-size: 0.83rem;
      color: var(--text-dim);
      line-height: 1.6;
      margin-top: 0.1rem;
    }

    footer {
      font-size: 0.72rem;
      color: var(--text-dim);
    }

    @media (max-width: 480px) {
      h1 { font-size: 1.5rem; }
      .projects { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Behold, my stuff.</h1>
    <p class="subtitle">kailean.com</p>
  </header>

  <div class="projects">
    <a class="project-card card-impromptu" href="https://impromptu.kailean.com">
      <span class="project-tag">Music</span>
      <span class="project-name">Impromptu Music</span>
      <span class="project-desc">Generate creative prompts for getting musically unstuck.</span>
    </a>

    <a class="project-card card-qr" href="https://qr.kailean.com">
      <span class="project-tag">Tool</span>
      <span class="project-name">QR Code Generator</span>
      <span class="project-desc">The result of educational tinkering with QR codes.</span>
    </a>

    <a class="project-card card-retro" href="https://retro.kailean.com">
      <span class="project-tag">Toy</span>
      <span class="project-name">Retro Encabulator</span>
      <span class="project-desc">A control panel for managing the turbo encabulator's cardinal grammeters.</span>
    </a>
  </div>

  <footer>more on the way</footer>
</body>
</html>
